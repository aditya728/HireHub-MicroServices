spring.application.name=api-gateway
server.port = 8084

#Eureka Configs
eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka/
eureka.client.register-with-eureka = true
eureka.client.fetch-registry = true

#Zipkin
management.tracing.sampling.probability = 1.0

#Gateway Config
spring.cloud.gateway.routes[0].id = company-service
spring.cloud.gateway.routes[0].uri = http://localhost:8085
spring.cloud.gateway.routes[0].predicates = Path=/company/**

spring.cloud.gateway.routes[1].id = job-service
spring.cloud.gateway.routes[1].uri = http://localhost:8086
spring.cloud.gateway.routes[1].predicates = Path=/jobs/**

spring.cloud.gateway.routes[2].id = review-service
spring.cloud.gateway.routes[2].uri = http://localhost:8087
spring.cloud.gateway.routes[2].predicates = Path=/reviews/**

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE

#Config Server
spring.config.import = optional:configserver:http://localhost:8080
